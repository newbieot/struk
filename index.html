<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Struk Thermal PRO</title>
    <style>
        /* === TAMPILAN UI WEBSITE (TIDAK TERCETAK) === */
        :root { --primary: #008CBA; --bg: #f4f4f9; --text: #333; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex: 1 1 350px; max-width: 600px; }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
        input[type="file"] { padding: 5px; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: #007399; }
        .btn-danger { background-color: #ff4757; color: white; padding: 10px; }
        .btn-danger:hover { background-color: #ff6b81; }
        .btn-print { background-color: #2ed573; color: white; width: 100%; font-size: 1.1rem; margin-top: 20px; padding: 15px; }
        .btn-print:hover { background-color: #26b361; }

        .item-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: #fafafa; padding: 10px; border-radius: 6px; border: 1px solid #eee; }
        .item-row input.qty { flex: 0.2; min-width: 50px; }
        .item-row input.name { flex: 1; }
        .item-row input.price { flex: 0.4; min-width: 80px; }

        /* === AREA PREVIEW STRUK === */
        .preview-wrapper { background: #2f3542; padding: 30px 20px; border-radius: 12px; display: flex; justify-content: center; }
        
        /* === BASE CSS UNTUK KERTAS THERMAL === */
        #receipt { background: white; padding: 10px; color: #000; width: 58mm; margin: 0 auto; overflow: hidden; word-wrap: break-word; }
        .logo-container { text-align: center; margin-bottom: 5px; }
        .logo-container img { max-width: 80%; height: auto; display: none; filter: grayscale(100%) contrast(1.2); }
        .flex-between { display: flex; justify-content: space-between; gap: 5px; width: 100%; }
        .text-center { text-align: center; }
        
        /* === TEMPLATE DESAIN STRUK === */
        .tpl-1 { font-family: 'Courier New', Courier, monospace; font-size: 12px; }
        .tpl-1 .divider { border-bottom: 1px dashed #000; margin: 6px 0; }
        .tpl-1 h3 { text-align: center; font-size: 16px; margin: 0 0 5px 0; text-transform: uppercase; }
        .tpl-1 .head-info { text-align: center; }
        .tpl-1 .total-line { font-weight: bold; border-top: 1px dashed #000; margin-top: 5px; padding-top: 5px; }

        .tpl-2 { font-family: Arial, sans-serif; font-size: 11px; }
        .tpl-2 .divider { border-bottom: 1px solid #000; margin: 8px 0; }
        .tpl-2 h3 { text-align: center; font-size: 15px; margin: 0 0 2px 0; font-weight: 900; }
        .tpl-2 .head-info { text-align: center; }
        .tpl-2 .total-line { font-weight: bold; border-top: 2px solid #000; font-size: 12px; margin-top: 5px; padding-top: 5px; }

        /* =========================================================================
           SOLUSI FINAL: ATURAN KHUSUS CETAK (PRINT)
           ========================================================================= */
        @media print {
            @page { 
                margin: 0 !important; 
                size: 58mm auto !important; /* auto sangat penting untuk memotong kertas sesuai panjang teks */
            }
            
            html, body { 
                margin: 0 !important; 
                padding: 0 !important; 
                background: white !important; 
                width: 100% !important; 
                display: block !important; 
                height: max-content !important; /* PERBAIKAN 2: Paksa agar tidak ada ruang lebih di bawah */
                min-height: 0 !important;
            }
            
            /* Sembunyikan elemen UI (Form) secara paksa */
            .panel:not(#print-panel), .btn-print, .no-print { 
                display: none !important; 
            }
            
            #print-panel { 
                position: absolute !important; 
                left: 0 !important; 
                top: 0 !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                width: 100% !important; 
                box-shadow: none !important; 
                background: transparent !important; 
                border: none !important;
                height: max-content !important; /* PERBAIKAN 2 */
            }
            
            .preview-wrapper { 
                display: block !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                background: transparent !important; 
                height: max-content !important; /* PERBAIKAN 2 */
            }
            
            #receipt { 
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                /* PERBAIKAN 1: margin-left 5mm untuk menggeser teks ke tengah kertas */
                margin: 0 0 0 1mm !important; 
                padding: 0 1mm 0 0 !important; 
                width: 44mm !important; /* Total aman cetak printer */
                max-width: 44mm !important; 
                box-shadow: none !important; 
                height: max-content !important; /* PERBAIKAN 2 */
                overflow: hidden !important; 
            }
            
            /* Hilangkan spasi berlebih pada bagian penutup */
            .text-center.footer-text {
                margin-bottom: 0 !important;
                padding-bottom: 0 !important;
            }
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2>PENGATURAN STRUK</h2>
        
        <div class="form-group">
            <label>Pilih Desain Struk</label>
            <select id="templateSelect" onchange="updatePreview()">
                <option value="tpl-1">1. Klasik (Dashed, Center)</option>
                <option value="tpl-2">2. Modern (Solid, Sans-serif)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Upload Logo Restoran (Opsional)</label>
            <input type="file" id="logoInput" accept="image/*">
        </div>

        <div class="form-group">
            <label>Nama Restoran</label>
            <input type="text" id="restoName" value="FRESH FOOD" oninput="updatePreview()">
        </div>
        <div class="form-group">
            <label>Alamat / Kontak</label>
            <input type="text" id="restoAddress" value="Jalan Van Hou&#10;Ten Belanda" oninput="updatePreview()">
        </div>

        <div class="form-group">
            <label>Tanggal & Waktu Transaksi</label>
            <input type="datetime-local" id="transactionDate" oninput="updatePreview()">
        </div>

        <h2 style="margin-top: 25px; display: flex; justify-content: space-between; align-items: center;">
            DAFTAR PESANAN
            <button class="btn btn-primary" onclick="addItem()" style="font-size: 12px; padding: 6px 12px;">+ Tambah</button>
        </h2>
        
        <div id="itemsContainer">
            <div class="item-row">
                <input type="number" class="qty" placeholder="Qty" value="1" min="1" oninput="updatePreview()">
                <input type="text" class="name" placeholder="Nama Menu" value="Prabowo" oninput="updatePreview()">
                <input type="number" class="price" placeholder="Harga" value="25000" oninput="updatePreview()">
                <button class="btn btn-danger" onclick="removeItem(this)">X</button>
            </div>
            <div class="item-row">
                <input type="number" class="qty" placeholder="Qty" value="2" min="1" oninput="updatePreview()">
                <input type="text" class="name" placeholder="Nama Menu" value="Gibran" oninput="updatePreview()">
                <input type="number" class="price" placeholder="Harga" value="5000" oninput="updatePreview()">
                <button class="btn btn-danger" onclick="removeItem(this)">X</button>
            </div>
            <div class="item-row">
                <input type="number" class="qty" placeholder="Qty" value="4" min="1" oninput="updatePreview()">
                <input type="text" class="name" placeholder="Nama Menu" value="Jokowi" oninput="updatePreview()">
                <input type="number" class="price" placeholder="Harga" value="10000" oninput="updatePreview()">
                <button class="btn btn-danger" onclick="removeItem(this)">X</button>
            </div>
        </div>

        <button class="btn btn-print" onclick="window.print()">🖨️ CETAK STRUK SEKARANG</button>
    </div>

    <div class="panel" id="print-panel">
        <h2 class="no-print" style="text-align: center; color: #555;">PREVIEW 58MM</h2>
        <div class="preview-wrapper">
            
            <div id="receipt" class="tpl-1">
                
                <div class="logo-container">
                    <img id="prevLogo" src="" alt="Logo">
                </div>

                <div class="head-info">
                    <h3 id="prevName">FRESH FOOD</h3>
                    <div id="prevAddress" style="white-space: pre-line;">Jalan Van Hou<br>Ten Belanda</div>
                </div>
                
                <div class="divider"></div>
                
                <div class="flex-between" style="margin-bottom: 5px;">
                    <span id="prevDate"></span>
                    <span>Kasir: Admin</span>
                </div>
                
                <div class="divider"></div>
                
                <div id="prevItems">
                    </div>
                
                <div class="divider"></div>
                
                <div class="flex-between total-line">
                    <span>TOTAL</span>
                    <span id="prevTotal">Rp 0</span>
                </div>
                
                <div class="divider" style="margin-top:10px;"></div>
                <div class="text-center footer-text" style="font-size: 0.9em; margin-top: 5px;">
                    Terima Kasih Atas<br>Kunjungan Anda<br>
                    Barang yang dibeli tidak<br>dapat ditukar
                </div>

            </div>
            </div>
    </div>

    <script>
        // Set Default Tanggal Input
        const now = new Date();
        const tzOffset = now.getTimezoneOffset() * 60000;
        const localISOTime = (new Date(now - tzOffset)).toISOString().slice(0, 16);
        document.getElementById('transactionDate').value = localISOTime;

        // Fungsi Format Rupiah
        function formatRp(angka) {
            return new Intl.NumberFormat('id-ID').format(angka);
        }

        // Fungsi Handle Upload Logo
        document.getElementById('logoInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            const logoImg = document.getElementById('prevLogo');
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    logoImg.src = e.target.result;
                    logoImg.style.display = 'inline-block';
                }
                reader.readAsDataURL(file);
            } else {
                logoImg.style.display = 'none';
                logoImg.src = '';
            }
        });

        function addItem() {
            const container = document.getElementById('itemsContainer');
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <input type="number" class="qty" placeholder="Qty" value="1" min="1" oninput="updatePreview()">
                <input type="text" class="name" placeholder="Nama Menu" oninput="updatePreview()">
                <input type="number" class="price" placeholder="Harga" oninput="updatePreview()">
                <button class="btn btn-danger" onclick="removeItem(this)">X</button>
            `;
            container.appendChild(row);
            updatePreview();
        }

        function removeItem(btn) {
            btn.parentElement.remove();
            updatePreview();
        }

        function updatePreview() {
            const template = document.getElementById('templateSelect').value;
            document.getElementById('receipt').className = template;
            document.getElementById('prevName').innerText = document.getElementById('restoName').value || 'NAMA RESTO';
            document.getElementById('prevAddress').innerText = document.getElementById('restoAddress').value;

            const dateInput = document.getElementById('transactionDate').value;
            if (dateInput) {
                const d = new Date(dateInput);
                const formattedDate = d.getDate().toString().padStart(2, '0') + '/' + 
                                      (d.getMonth() + 1).toString().padStart(2, '0') + '/' + 
                                      d.getFullYear() + ' ' + 
                                      d.getHours().toString().padStart(2, '0') + ':' + 
                                      d.getMinutes().toString().padStart(2, '0');
                document.getElementById('prevDate').innerText = formattedDate;
            }

            const itemRows = document.querySelectorAll('.item-row');
            let itemsHTML = '';
            let total = 0;

            itemRows.forEach(row => {
                const qty = parseInt(row.querySelector('.qty').value) || 0;
                const name = row.querySelector('.name').value || '';
                const price = parseInt(row.querySelector('.price').value) || 0;
                const subtotal = qty * price;
                
                if (qty > 0 && name.trim() !== '') {
                    total += subtotal;
                    itemsHTML += `
                        <div style="margin-bottom: 4px;">
                            <div>${name}</div>
                            <div class="flex-between">
                                <span style="flex:1; padding-right:5px; word-break: break-all;">${qty} x ${formatRp(price)}</span>
                                <span style="white-space: nowrap;">${formatRp(subtotal)}</span>
                            </div>
                        </div>
                    `;
                }
            });

            document.getElementById('prevItems').innerHTML = itemsHTML;
            document.getElementById('prevTotal').innerText = 'Rp ' + formatRp(total);
        }

        updatePreview();
    </script>
</body>
</html>
